# ═══════════════════════════════════════════════════════════════════════════════
# CI/CD — PROD workflow
# Активира се на: push или PR кон 'main' гранка
# Прави: build → test → push слики → ЧЕКА ОДОБРУВАЊЕ → deploy на PROD
# ═══════════════════════════════════════════════════════════════════════════════

name: CI/CD — Prod

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE: ghcr.io/${{ github.repository_owner }}/notesapp-backend
  FRONTEND_IMAGE: ghcr.io/${{ github.repository_owner }}/notesapp-frontend

jobs:

  # ─────────────────────────────────────────────────────────────────────────────
  # JOB 1: Build + Test Backend
  # ─────────────────────────────────────────────────────────────────────────────
  build-test-backend:
    name: 🔨 Build & Test Backend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Run Maven tests
        run: mvn clean test -B

      - name: Build JAR
        run: mvn package -DskipTests -B

  # ─────────────────────────────────────────────────────────────────────────────
  # JOB 2: Build + Test Frontend
  # ─────────────────────────────────────────────────────────────────────────────
  build-test-frontend:
    name: 🎨 Build & Test Frontend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: notesapp-frontend/package-lock.json

      - name: Install dependencies
        working-directory: notesapp-frontend
        run: npm ci

      - name: Lint
        working-directory: notesapp-frontend
        run: npm run lint

      - name: Build
        working-directory: notesapp-frontend
        run: npm run build

  # ─────────────────────────────────────────────────────────────────────────────
  # JOB 3: Build Docker слики и Push со 'latest' таг
  # ─────────────────────────────────────────────────────────────────────────────
  push-images:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    needs: [build-test-backend, build-test-frontend]
    if: github.event_name == 'push'

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata for Backend
        id: meta-backend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.BACKEND_IMAGE }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=prod-
            type=raw,value=latest

      - name: Extract metadata for Frontend
        id: meta-frontend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.FRONTEND_IMAGE }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=prod-
            type=raw,value=latest

      - name: Build & Push Backend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.github
          push: true
          tags: ${{ steps.meta-backend.outputs.tags }}
          labels: ${{ steps.meta-backend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & Push Frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./notesapp-frontend
          file: ./notesapp-frontend/Dockerfile.github
          push: true
          tags: ${{ steps.meta-frontend.outputs.tags }}
          labels: ${{ steps.meta-frontend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─────────────────────────────────────────────────────────────────────────────
  # JOB 4: Deploy на PROD — БАРА РАЧНО ОДОБРУВАЊЕ
  # Постави во: Settings → Environments → prod → Required reviewers
  # ─────────────────────────────────────────────────────────────────────────────
  deploy-prod:
    name: 🏭 Deploy to PROD
    runs-on: ubuntu-latest
    needs: push-images
    if: github.event_name == 'push'

    environment:
      name: prod

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to PROD server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          script: |
            export GITHUB_REPOSITORY_OWNER=${{ github.repository_owner }}
            export IMAGE_TAG=latest
            export SPRING_PROFILE=prod

            echo ${{ secrets.GITHUB_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            docker compose -f docker-compose.github.yml pull
            docker compose -f docker-compose.github.yml up -d

            echo "⏳ Cekam backend..."
            sleep 20

            curl --fail http://localhost:8080/actuator/health || exit 1
            echo "✅ PROD deploy uspesen!"

      - name: Notify success
        if: success()
        run: echo "🎉 Production deploy завршен! Commit ${{ github.sha }} од ${{ github.actor }}"

      - name: Notify failure
        if: failure()
        run: echo "❌ Production deploy НЕУСПЕШЕН! Commit ${{ github.sha }}"
