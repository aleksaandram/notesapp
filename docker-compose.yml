services:
  app_blue:
    image: host.docker.internal:8084/notesapp:latest
    container_name: app_blue
    environment:
      - COLOR=BLUE
    ports:
      - "8085:8080"
    networks:
      - app-net

  app_green:
    image: host.docker.internal:8084/notesapp:latest
    container_name: app_green
    environment:
      - COLOR=GREEN
    ports:
       - "8086:8080"
    networks:
      - app-net

  nginx:
    build: ./nginx
    image: nginx:alpine
    container_name: nginx_proxy
    ports:
      - "80:80"
    depends_on:
      - app_blue
      - app_green
    networks:
      - app-net

  frontend:
    build: ./notesapp-frontend
    container_name: notesapp-frontend
    ports:
      - "3001:80"
    networks:
      - app-net

  gitea:
    image: gitea/gitea:latest
    container_name: gitea
    ports:
      - "3000:3000"
      - "222:22"
    environment:
      - GITEA__webhook__ALLOWED_HOST_LIST=*
    volumes:
      - gitea-data:/data
    networks:
      - app-net

  jenkins:
    build: ./jenkins
    container_name: jenkins
    ports:
      - "8090:8080"
      - "50000:50000"
    environment:
      - JAVA_OPTS=-Dhttps.protocols=TLSv1.2,TLSv1.3 -Dhudson.model.DownloadService.noSignatureCheck=true
      - MAVEN_OPTS=-Dhttps.protocols=TLSv1.2,TLSv1.3
    user: root
    volumes:
      - jenkins-data:/var/jenkins_home
      - C:/Users/PC/.m2:/var/jenkins_home/.m2
      - //var/run/docker.sock:/var/run/docker.sock
    networks:
      - app-net

  nexus:
    image: sonatype/nexus3:latest
    container_name: nexus
    ports:
      - "8083:8081"
      - "8084:8082"
    volumes:
      - nexus-data:/nexus-data
    networks:
      - app-net

volumes:
  gitea-data:
  jenkins-data:
  nexus-data:

networks:
  app-net:
    driver: bridge